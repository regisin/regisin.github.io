<!DOCTYPE html>
<html lang="en">
    {% include 'head.html' %}
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            font-family: Roboto, monospace;
        }
        #wrapper {
            max-width: 100%;
            min-height: 100%;
            margin: auto;
            position: relative;
        }
        #header {
            padding: 10px;
        }
        #content {
          position: relative;
          padding-bottom: 2.5em; /* same as #footer.height*/
        }
        #footer {
            width: 100%;
            height: 2.5em;
            position: absolute;
            bottom: 0;
            left: 0;
            padding: 0;
        }
    </style>
    <body>
        <div id="wrapper">
            <div id="header">
                {% include 'header.html' %}
            </div>

            <div id="content">
                {% block content %}{% endblock %}
            </div>

            <div id="footer">
                {% include 'footer.html' %}
            </div>
        </div>
    </body>
</html>
