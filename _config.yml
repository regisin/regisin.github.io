# If you want to link only specific pages in your header, uncomment
# this and add the path to the pages in order as they should show up
header_pages:
 - teaching.md
 - research.md
 - publications.md

# Build settings
theme: minima

plugins:
 - jekyll-feed
 - jekyll-seo-tag
 - jekyll-gist
 - jekyll-paginate

paginate: 10
paginate_path: "/page:num/"

show_excerpts: true

collections:
 research:
  output: true
 publications: 
  output: false

use_math: true

titles_from_headings:
  enabled:     true
  strip_title: true
  collections: true

permalink:   /:categories/:title/
highlighter: rouge
markdown: kramdown
kramdown:
  math_engine: katex
  input: GFM
  auto_ids: true
  hard_wrap: false
  syntax_highlighter: rouge